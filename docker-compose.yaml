services:
  api:
    build:
      context: ./domu-api
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./domu-api:/app               # tu código fuente
      - node_modules:/app/node_modules  # named volume, aislado del host 👈
    env_file:
      - ./domu-api/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - CHOKIDAR_USEPOLLING=true

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: emilio
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: domu_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emilio -d domu_dev"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
  node_modules:    # 👈 named volume declarado aquí